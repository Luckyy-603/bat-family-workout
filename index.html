<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;--surf:#0e0e12;--surf2:#14141a;--surf3:#1c1c24;
  --b1:#22222c;--b2:#2e2e3a;--b3:#3a3a4a;
  --acc:#4d8eff;--acc-d:rgba(77,142,255,.12);--acc-g:rgba(77,142,255,.25);
  --txt:#dcdce8;--td:#7c7c90;--tm:#4a4a5a;
  --ok:#2ecc8a;--ok-d:rgba(46,204,138,.12);
  --warn:#e8a838;--warn-d:rgba(232,168,56,.12);
  --err:#e84848;--err-d:rgba(232,72,72,.12);
  --bruce:#c8963c;--bruce-d:rgba(200,150,60,.12);
  --nw:#4d8eff;--nw-d:rgba(77,142,255,.12);
  --bb:#9b4dff;--bb-d:rgba(155,77,255,.12);
  --jt:#e84848;--jt-d:rgba(232,72,72,.12);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow-x:hidden;font-size:14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
input{font-family:'JetBrains Mono',monospace;background:var(--surf2);border:1px solid var(--b2);color:var(--txt);border-radius:5px;padding:5px 6px;font-size:12px;text-align:center;width:100%;transition:border-color .2s;outline:none}
input:focus{border-color:var(--acc)}input::placeholder{color:var(--tm)}
textarea{font-family:'DM Sans',sans-serif;background:var(--surf2);border:1px solid var(--b1);color:var(--txt);border-radius:6px;padding:8px;font-size:13px;width:100%;resize:none;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--acc)}textarea::placeholder{color:var(--tm)}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fi{animation:fi .25s ease forwards}
.pulse{animation:pulse 2s infinite}
</style>
</head>

const EX={

  'lateral-bound':{name:'Lateral Bounds',cat:'power',muscles:['Glutes','Adductors','Calves'],
    info:'Single-leg takeoff. Jump laterally, stick landing on opposite leg. Absorb force through hip and knee. No wobble. Build power and stability simultaneously.'},
  'agility-ladder':{name:'Agility Ladder Drills',cat:'movement',muscles:['Calves','Hip Flexors','CNS'],

  'chin-ups':{name:'Chin-Ups',cat:'strength',muscles:['Lats','Biceps','Core'],

  'dips':{name:'Dips',cat:'strength',muscles:['Triceps','Chest','Anterior Delts'],

function reducer(s,a){
  switch(a.t){
    case'NAV':return{...s,view:a.v,dayId:a.d??s.dayId};
    case'PROG':return{...s,prog:a.p,view:'dash',dayId:null};
    case'WEEK':return{...s,week:Math.max(1,Math.min(52,a.w))};
    case'DAY':return{...s,view:'workout',dayId:a.id};
    case'TOGGLE_WARMUP':return{...s,showWarmup:!s.showWarmup};
    case'TOGGLE_EX':{
      const k=`${a.d}-${a.bi}-${a.ei}`;
      return{...s,expandEx:{...s.expandEx,[k]:!s.expandEx[k]}};
    }
    case'SET_LOG':{
      const{dayId:d,bi,ei,si,field,val}=a;
      const wk=`w${s.week}`;
      const L=JSON.parse(JSON.stringify(s.logs));
      L[wk]=L[wk]||{};L[wk][d]=L[wk][d]||{};
      const k=`${bi}-${ei}`;
      L[wk][d][k]=L[wk][d][k]||{sets:[],notes:'',done:false};
      L[wk][d][k].sets[si]=L[wk][d][k].sets[si]||{reps:'',weight:'',done:false};
      L[wk][d][k].sets[si][field]=val;
      return{...s,logs:L};
    }
    case'TOGGLE_SET':{
      const{dayId:d,bi,ei,si}=a;
      const wk=`w${s.week}`;
      const L=JSON.parse(JSON.stringify(s.logs));
      L[wk]=L[wk]||{};L[wk][d]=L[wk][d]||{};
      const k=`${bi}-${ei}`;
      L[wk][d][k]=L[wk][d][k]||{sets:[],notes:'',done:false};
      L[wk][d][k].sets[si]=L[wk][d][k].sets[si]||{reps:'',weight:'',done:false};
      L[wk][d][k].sets[si].done=!L[wk][d][k].sets[si].done;
      return{...s,logs:L};
    }
    case'LOG_NOTES':{
      const{dayId:d,bi,ei,notes}=a;
      const wk=`w${s.week}`;
      const L=JSON.parse(JSON.stringify(s.logs));
      L[wk]=L[wk]||{};L[wk][d]=L[wk][d]||{};
      const k=`${bi}-${ei}`;
      L[wk][d][k]=L[wk][d][k]||{sets:[],notes:'',done:false};
      L[wk][d][k].notes=notes;
      return{...s,logs:L};
    }
    case'COMPLETE_DAY':{
      const wk=`w${s.week}`;
      const L=JSON.parse(JSON.stringify(s.logs));
      L[wk]=L[wk]||{};L[wk][a.id]=L[wk][a.id]||{};
      L[wk][a.id].__done=!L[wk][a.id].__done;
      return{...s,logs:L};
    }
    case'LOG_BW':{
      const today=new Date().toISOString().split('T')[0];
      const log=s.bwLog.filter(e=>e.date!==today);
      return{...s,bwLog:[...log,{date:today,w:parseFloat(a.w)}].sort((a,b)=>a.date<b.date?-1:1)};
    }
    case'EX_SEARCH':return{...s,exSearch:a.q};
    case'EX_DETAIL':return{...s,exDetail:a.id,view:'exdetail'};
    case'UNITS':return{...s,units:a.u};
    default:return s;
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getLog(logs,week,dayId,bi,ei){
  return logs[`w${week}`]?.[dayId]?.[`${bi}-${ei}`]||{sets:[],notes:'',done:false};
}
function isDayDone(logs,week,dayId){return!!(logs[`w${week}`]?.[dayId]?.__done);}
function getStreak(logs,prog,week){
  const p=PROGRAMS[prog];let streak=0;
  for(let w=week;w>=1;w--){
    const wk=`w${w}`;
    let allDone=true;
    for(const d of p.days){
      if(!logs[wk]?.[d.id]?.__done){allDone=false;break;}
    }
    if(allDone)streak++;else break;
  }
  return streak;
}
function getWeekProgress(logs,prog,week){
  const p=PROGRAMS[prog];let done=0;
  for(const d of p.days){if(logs[`w${week}`]?.[d.id]?.__done)done++;}
  return{done,total:p.days.length};
}
function getPhase(week){
  const cycle=((week-1)%5)+1;
  return PROGRESSION[cycle-1]||PROGRESSION[0];
}
function catColor(cat){
  const m={strength:'#4d8eff',conditioning:'#9b4dff',power:'#e84848',core:'#2ecc8a',
    mobility:'#4a9a9a',movement:'#c8963c',warmup:'#5a5a6a',durability:'#7c7c90'};
  return m[cat]||'#5a5a6a';
}

          {label:'Streak',val:`${streak}wk`,color:'var(--acc)'},
          {label:'Weight',val:latestBw?`${latestBw.w}${state.units}`:'—',color:'var(--warn)'},
        ].map(s=>(
          <div key={s.label} style={{...S.card,padding:'12px',textAlign:'center'}}>
            <div style={{...S.label,fontSize:'9px',marginBottom:'6px'}}>{s.label}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'22px',fontWeight:800,color:s.color}}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* Week progress bar */}
      <div style={{...S.card,padding:'14px',marginBottom:'20px'}}>
        <div style={{...S.row,justifyContent:'space-between',marginBottom:'10px'}}>
          <span style={S.label}>Weekly Progress</span>
          <span style={{...S.label,color:'var(--ok)'}}>{Math.round(done/total*100)}%</span>
        </div>
        <ProgressBar pct={done/total*100} color="var(--ok)"/>
        <div style={{display:'flex',gap:'6px',marginTop:'12px',flexWrap:'wrap'}}>
          {p.days.map(day=>{
            const done2=isDayDone(state.logs,state.week,day.id);
            const ch=CHAR[day.char];
            return (
              <button key={day.id}
                onClick={()=>dispatch({t:'DAY',id:day.id})}
                style={{flex:'1',minWidth:'60px',padding:'8px 6px',borderRadius:'6px',textAlign:'center',
                  background:done2?`${ch.color}18`:'var(--surf2)',
                  border:`1px solid ${done2?ch.color+'44':'var(--b2)'}`,
                  transition:'all .2s',cursor:'pointer'}}>
                <div style={{...S.label,fontSize:'9px',color:done2?ch.color:'var(--tm)',marginBottom:'3px'}}>D{day.num}</div>
                <div style={{fontSize:'10px',color:done2?ch.color:'var(--td)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600}}>
                  {done2?'✓':ch.label.slice(0,4)}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Today's workout */}
      <div style={{marginBottom:'20px'}}>
        <div style={{...S.label,marginBottom:'10px'}}>Today's Mission</div>
        {p.days.map((day,i)=>{
          if(i>1)return null; // show first 2 undone
          const done2=isDayDone(state.logs,state.week,day.id);
          const ch=CHAR[day.char];
          return (
            <button key={day.id} onClick={()=>dispatch({t:'DAY',id:day.id})}
              style={{...S.card,width:'100%',marginBottom:'8px',padding:'14px',textAlign:'left',
                borderLeft:`3px solid ${done2?ch.color+'66':ch.color}`,
                background:done2?'var(--surf)':'var(--surf)',opacity:done2?.7:1,
                transition:'all .2s',cursor:'pointer'}}>
              <div style={{...S.row,justifyContent:'space-between',marginBottom:'6px'}}>
                <Badge text={ch.label} color={ch.color} small/>
                <span style={{...S.label,fontSize:'9px'}}>{day.label}</span>
              </div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',fontWeight:700,
                color:done2?'var(--td)':'var(--txt)',letterSpacing:'-.01em'}}>
                {day.name}
              </div>
              <div style={{fontSize:'11px',color:'var(--td)',marginTop:'4px'}}>
                {day.blocks.reduce((a,b)=>a+b.ex.length,0)} exercises · {day.blocks.length} blocks
                {done2&&<span style={{color:'var(--ok)',marginLeft:'8px'}}>✓ Complete</span>}
              </div>
            </button>
          );
        })}
      </div>

      {/* Bodyweight logger */}
      <div style={{...S.card,padding:'14px'}}>
        <div style={{...S.label,marginBottom:'10px'}}>Log Bodyweight</div>
        <div style={{...S.row}}>
          <input
            type="number" placeholder={`Weight (${state.units})`}
            value={bwInput} onChange={e=>setBwInput(e.target.value)}
            style={{flex:1,padding:'8px 10px',fontSize:'14px'}}
          />
          <button
            onClick={()=>{if(bwInput){dispatch({t:'LOG_BW',w:bwInput});setBwInput('');}}}
            style={{padding:'8px 16px',background:'var(--acc-d)',border:'1px solid var(--acc)',
              borderRadius:'6px',color:'var(--acc)',fontFamily:"'Barlow Condensed',sans-serif",
              fontWeight:700,fontSize:'13px',letterSpacing:'.04em',whiteSpace:'nowrap'}}>
            LOG
          </button>
        </div>
        {state.bwLog.length>0&&(
          <div style={{marginTop:'10px',display:'flex',gap:'6px',flexWrap:'wrap'}}>
            {state.bwLog.slice(-5).map((e,i)=>(
              <div key={i} style={{fontSize:'11px',padding:'3px 8px',background:'var(--surf3)',
                borderRadius:'4px',color:'var(--td)',fontFamily:"'JetBrains Mono',monospace"}}>
                {e.w}{state.units}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Week navigation */}
      <div style={{...S.row,justifyContent:'space-between',marginTop:'20px',padding:'12px',
        background:'var(--surf)',border:'1px solid var(--b1)',borderRadius:'8px'}}>
        <button onClick={()=>dispatch({t:'WEEK',w:state.week-1})}
          style={{...S.row,gap:'4px',color:'var(--td)',padding:'4px 10px',borderRadius:'5px',
            background:'var(--surf2)',border:'1px solid var(--b1)'}}>
          <IconArrow dir="left"/><span style={{...S.label}}>Prev</span>
        </button>
        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'16px',fontWeight:700}}>
          Week {state.week}
        </span>
        <button onClick={()=>dispatch({t:'WEEK',w:state.week+1})}
          style={{...S.row,gap:'4px',color:'var(--td)',padding:'4px 10px',borderRadius:'5px',
            background:'var(--surf2)',border:'1px solid var(--b1)'}}>
          <span style={{...S.label}}>Next</span><IconArrow dir="right"/>
        </button>
      </div>
    </div>
  );
}

// ─── SET ROW ──────────────────────────────────────────────────────────────────
function SetRow({setNum,log,dayId,bi,ei,si,dispatch,showWeight}){
  const sl=log?.sets?.[si]||{reps:'',weight:'',done:false};
  return (
    <div style={{display:'grid',gridTemplateColumns:showWeight?'32px 1fr 1fr 36px':'32px 1fr 36px',
      gap:'6px',alignItems:'center',padding:'5px 0',
      borderTop:si>0?'1px solid var(--b1)':'none'}}>
      <div style={{...S.label,fontSize:'10px',textAlign:'center',color:'var(--tm)'}}>{setNum}</div>
      {showWeight&&(
        <input type="text" placeholder="—" value={sl.weight}
          onChange={e=>dispatch({t:'SET_LOG',dayId,bi,ei,si,field:'weight',val:e.target.value})}
          style={{padding:'5px 4px',fontSize:'12px'}}
        />
      )}
      <input type="text" placeholder="—" value={sl.reps}
        onChange={e=>dispatch({t:'SET_LOG',dayId,bi,ei,si,field:'reps',val:e.target.value})}
        style={{padding:'5px 4px',fontSize:'12px'}}
      />
      <button onClick={()=>dispatch({t:'TOGGLE_SET',dayId,bi,ei,si})}
        style={{width:'34px',height:'34px',borderRadius:'6px',display:'flex',
          alignItems:'center',justifyContent:'center',flexShrink:0,
          background:sl.done?'var(--ok-d)':'var(--surf3)',
          border:`1px solid ${sl.done?'var(--ok)':'var(--b2)'}`,
          color:sl.done?'var(--ok)':'var(--td)',transition:'all .15s'}}>
        {sl.done?<IconCheck/>:<span style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--b3)',display:'block'}}/>}
      </button>
    </div>
  );
}

// ─── EXERCISE CARD ────────────────────────────────────────────────────────────
function ExCard({ex,dayId,bi,ei,log,state,dispatch,showWeight}){
  const exData=EX[ex.id];
  const expanded=state.expandEx[`${dayId}-${bi}-${ei}`];
  const setCount=typeof ex.sets==='number'?ex.sets:parseInt(ex.sets)||1;
  const completedSets=log?.sets?.filter(s=>s.done).length||0;
  const allDone=ex.sets&&completedSets>=setCount;
  const cat=exData?.cat||'strength';
  const cc=catColor(cat);

  return (
    <div style={{...S.card2,marginBottom:'6px',overflow:'hidden',
      borderLeft:`2px solid ${allDone?'var(--ok)':cc}66`,
      transition:'border-color .2s'}}>
      {/* Header row */}
      <div style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'10px 12px',cursor:'pointer'}}
        onClick={()=>dispatch({t:'TOGGLE_EX',d:dayId,bi,ei})}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{...S.row,gap:'6px',marginBottom:'3px',flexWrap:'wrap'}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'15px',fontWeight:700,
              color:allDone?'var(--td)':'var(--txt)',letterSpacing:'-.01em'}}>
              {exData?.name||ex.id}
            </span>
            {allDone&&<span style={{color:'var(--ok)',fontSize:'12px'}}>✓</span>}
          </div>
          <div style={{...S.row,gap:'8px',flexWrap:'wrap'}}>
            {ex.sets&&<span style={{...S.num,fontSize:'11px',color:cc}}>
              {ex.sets}×{ex.reps}
            </span>}
            {!ex.sets&&<span style={{fontSize:'11px',color:'var(--td)'}}>{ex.reps}</span>}
            {ex.rest&&<span style={{fontSize:'11px',color:'var(--tm)'}}>{ex.rest} rest</span>}
            {completedSets>0&&ex.sets&&<span style={{fontSize:'11px',color:'var(--ok)'}}>{completedSets}/{setCount} sets</span>}
          </div>
        </div>
        <div style={{...S.row,gap:'8px',flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();dispatch({t:'EX_DETAIL',id:ex.id});}}
            style={{padding:'4px 8px',borderRadius:'4px',background:'var(--surf3)',
              border:'1px solid var(--b2)',fontSize:'10px',color:'var(--td)',
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,letterSpacing:'.04em'}}>
            INFO
          </button>
          <div style={{color:'var(--tm)',paddingTop:'2px'}}>
            <IconChevron dir={expanded?'up':'down'}/>
          </div>
        </div>
      </div>

      {/* Expanded content */}
      {expanded&&(
        <div style={{padding:'0 12px 12px',animation:'fi .2s ease'}}>
          {ex.note&&<div style={{fontSize:'11px',color:'var(--td)',marginBottom:'10px',
            padding:'6px 8px',background:'var(--surf3)',borderRadius:'5px',
            borderLeft:'2px solid var(--b3)'}}>
            {ex.note}
          </div>}

          {ex.sets&&(
            <div>
              {/* Table header */}
              <div style={{display:'grid',
                gridTemplateColumns:showWeight?'32px 1fr 1fr 36px':'32px 1fr 36px',
                gap:'6px',marginBottom:'4px'}}>
                <div style={{...S.label,fontSize:'9px',textAlign:'center'}}>SET</div>
                {showWeight&&<div style={{...S.label,fontSize:'9px',textAlign:'center'}}>{state.units.toUpperCase()}</div>}
                <div style={{...S.label,fontSize:'9px',textAlign:'center'}}>REPS</div>
                <div style={{...S.label,fontSize:'9px',textAlign:'center'}}>✓</div>
              </div>
              {Array.from({length:setCount}).map((_,si)=>(
                <SetRow key={si} setNum={si+1} log={log} dayId={dayId}
                  bi={bi} ei={ei} si={si} dispatch={dispatch} showWeight={showWeight}/>
              ))}
            </div>
          )}

          {/* Notes */}
          <div style={{marginTop:'10px'}}>
            <div style={{...S.label,fontSize:'9px',marginBottom:'4px'}}>Notes</div>
            <textarea rows={2} placeholder="Log notes, cues, how it felt..."
              value={log?.notes||''}
              onChange={e=>dispatch({t:'LOG_NOTES',dayId,bi,ei,notes:e.target.value})}
            />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── WORKOUT VIEW ─────────────────────────────────────────────────────────────
function WorkoutView({state,dispatch}){
  const p=PROGRAMS[state.prog];
  const day=p.days.find(d=>d.id===state.dayId)||p.days[0];
  const ch=CHAR[day.char];
  const isDone=isDayDone(state.logs,state.week,day.id);
  const phase=getPhase(state.week);
  const strengthCats=['strength','power'];
  
  const handlePrev=()=>{
    const idx=p.days.findIndex(d=>d.id===day.id);
    if(idx>0)dispatch({t:'DAY',id:p.days[idx-1].id});
  };
  const handleNext=()=>{
    const idx=p.days.findIndex(d=>d.id===day.id);
    if(idx<p.days.length-1)dispatch({t:'DAY',id:p.days[idx+1].id});
  };

  return (
    <div style={{paddingBottom:'80px',maxWidth:'480px',margin:'0 auto'}}>
      {/* Workout header */}
      <div style={{padding:'16px 16px 0',background:'var(--surf)',borderBottom:'1px solid var(--b1)',
        marginBottom:'0'}}>
        <div style={{...S.row,justifyContent:'space-between',marginBottom:'10px'}}>
          <div style={{...S.row,gap:'6px'}}>
            <Badge text={ch.label} color={ch.color}/>
            <Badge text={`W${state.week}`} color={phase.color} small/>
          </div>
          <span style={{...S.label,fontSize:'9px'}}>{day.label}</span>
        </div>
        <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'22px',fontWeight:800,
          lineHeight:1.1,marginBottom:'8px',letterSpacing:'-.01em'}}>
          {day.name}
        </h2>
        <div style={{...S.row,justifyContent:'space-between',paddingBottom:'12px'}}>
          <div style={{...S.row,gap:'12px'}}>
            <span style={{fontSize:'11px',color:'var(--td)'}}>
              {day.blocks.reduce((a,b)=>a+b.ex.length,0)} exercises
            </span>
            <span style={{fontSize:'11px',color:'var(--td)'}}>
              {day.blocks.length} blocks
            </span>
          </div>
          {isDone&&<span style={{fontSize:'11px',color:'var(--ok)',fontWeight:600}}>✓ COMPLETE</span>}
        </div>

        {/* Day navigation */}
        <div style={{...S.row,justifyContent:'space-between',paddingTop:'8px',paddingBottom:'12px',
          borderTop:'1px solid var(--b1)'}}>
          <button onClick={handlePrev}
            style={{...S.row,gap:'4px',color:'var(--td)',fontSize:'11px',
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,letterSpacing:'.04em',
              padding:'4px 0',opacity:p.days.findIndex(d=>d.id===day.id)===0?.3:1}}>
            <IconArrow dir="left"/> PREV DAY
          </button>
          <div style={{display:'flex',gap:'5px'}}>
            {p.days.map(d=>(
              <button key={d.id} onClick={()=>dispatch({t:'DAY',id:d.id})}
                style={{width:'22px',height:'6px',borderRadius:'3px',
                  background:d.id===day.id?ch.color:isDayDone(state.logs,state.week,d.id)?'var(--ok)44':'var(--b2)',
                  transition:'background .2s',border:'none',cursor:'pointer'}}/>
            ))}
          </div>
          <button onClick={handleNext}
            style={{...S.row,gap:'4px',color:'var(--td)',fontSize:'11px',
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,letterSpacing:'.04em',
              padding:'4px 0',opacity:p.days.findIndex(d=>d.id===day.id)===p.days.length-1?.3:1}}>
            NEXT DAY <IconArrow dir="right"/>
          </button>
        </div>
      </div>

      {/* Progression tip */}
      <div style={{margin:'12px 16px',padding:'10px 12px',background:`${phase.color}15`,
        border:`1px solid ${phase.color}33`,borderRadius:'6px'}}>
        <div style={{...S.label,fontSize:'9px',color:phase.color,marginBottom:'3px'}}>{phase.phase}</div>
        <p style={{fontSize:'11px',color:'var(--td)',lineHeight:1.4}}>{phase.tip}</p>
      </div>

      {/* Global warmup */}
      {day.warmup&&(
        <div style={{margin:'0 16px 12px'}}>
          <button onClick={()=>dispatch({t:'TOGGLE_WARMUP'})}
            style={{...S.card,width:'100%',padding:'12px 14px',textAlign:'left',cursor:'pointer'}}>
            <div style={{...S.row,justifyContent:'space-between'}}>
              <div>
                <div style={{...S.label,fontSize:'9px',color:'var(--td)',marginBottom:'3px'}}>Pre-Session</div>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'15px',fontWeight:700}}>
                  Global Warm-Up Protocol
                </span>
              </div>
              <IconChevron dir={state.showWarmup?'up':'down'}/>
            </div>
          </button>
          {state.showWarmup&&(
            <div style={{...S.card,marginTop:'2px',padding:'12px 14px',animation:'fi .2s ease'}}>
              {WARMUP_EX.map((w,i)=>(
                <div key={i} style={{...S.row,gap:'10px',padding:'6px 0',
                  borderTop:i>0?'1px solid var(--b1)':'none'}}>
                  <div style={{minWidth:'28px',height:'28px',borderRadius:'6px',
                    background:'var(--surf3)',display:'flex',alignItems:'center',justifyContent:'center',
                    fontFamily:"'JetBrains Mono',monospace",fontSize:'10px',color:'var(--td)',flexShrink:0}}>
                    {i+1}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'13px',fontWeight:500}}>{EX[w.exId]?.name||w.exId}</div>
                    <div style={{fontSize:'11px',color:'var(--td)'}}>{w.reps}{w.note&&` · ${w.note}`}</div>
                  </div>
                </div>
              ))}
              <div style={{marginTop:'10px',padding:'8px',background:'var(--surf3)',borderRadius:'5px'}}>
                <p style={{fontSize:'11px',color:'var(--td)'}}>
                  Then 1–3 ramp-up sets at 40–60–80% before first main lift.
                </p>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Exercise blocks */}
      <div style={{padding:'0 16px'}}>
        {day.blocks.map((block,bi)=>{
          const blockColor=BLOCK_COLORS[block.type]||'#5a5a6a';
          const showW=strengthCats.includes(block.type)||block.ex.some(e=>EX[e.id]?.cat==='strength');
          return (
            <div key={bi} style={{marginBottom:'16px'}}>
              <div style={{...S.row,gap:'8px',marginBottom:'8px'}}>
                <div style={{height:'14px',width:'3px',borderRadius:'2px',background:blockColor,flexShrink:0}}/>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'13px',fontWeight:700,
                  letterSpacing:'.06em',textTransform:'uppercase',color:blockColor}}>
                  {block.name}
                </span>
              </div>
              {block.ex.map((ex,ei)=>{
                const log=getLog(state.logs,state.week,day.id,bi,ei);
                return <ExCard key={ei} ex={ex} dayId={day.id} bi={bi} ei={ei}
                  log={log} state={state} dispatch={dispatch} showWeight={showW}/>;
              })}
            </div>
          );
        })}
      </div>

      {/* Complete button */}
      <div style={{padding:'8px 16px 16px'}}>
        <button
          onClick={()=>dispatch({t:'COMPLETE_DAY',id:day.id})}
          style={{width:'100%',padding:'14px',borderRadius:'8px',
            background:isDone?'var(--surf2)':'var(--ok-d)',
            border:`1px solid ${isDone?'var(--b2)':'var(--ok)'}`,
            color:isDone?'var(--td)':'var(--ok)',
            fontFamily:"'Barlow Condensed',sans-serif",fontSize:'16px',fontWeight:800,
            letterSpacing:'.08em',textTransform:'uppercase',transition:'all .2s'}}>
          {isDone?'✓ MISSION COMPLETE — TAP TO UNDO':'MARK MISSION COMPLETE'}
        </button>
      </div>
    </div>
  );
}

// ─── LIBRARY VIEW ─────────────────────────────────────────────────────────────
function LibraryView({state,dispatch}){
  const cats=['strength','conditioning','power','core','mobility','movement','durability','warmup'];
  const [filter,setFilter]=useState('');
  const q=state.exSearch.toLowerCase();
  const entries=Object.entries(EX);
  const filtered=entries.filter(([id,ex])=>{
    if(filter&&ex.cat!==filter)return false;
    if(q&&!ex.name.toLowerCase().includes(q)&&!ex.cat.includes(q))return false;
    return true;
  });

  return (
    <div className="fi" style={{padding:'20px 16px',paddingBottom:'80px',maxWidth:'480px',margin:'0 auto'}}>
      <div style={{...S.label,marginBottom:'16px'}}>Exercise Library</div>

      {/* Search */}
      <div style={{position:'relative',marginBottom:'12px'}}>
        <div style={{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',
          color:'var(--tm)',pointerEvents:'none'}}><IconSearch/></div>
        <input
          placeholder="Search exercises..."
          value={state.exSearch}
          onChange={e=>dispatch({t:'EX_SEARCH',q:e.target.value})}
          style={{paddingLeft:'32px',paddingRight:'12px',padding:'10px 10px 10px 32px',
            textAlign:'left',fontSize:'13px'}}
        />
      </div>

      {/* Category filter */}
      <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'16px'}}>
        <button onClick={()=>setFilter('')}
          style={{padding:'4px 10px',borderRadius:'4px',fontSize:'11px',
            fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'.04em',
            textTransform:'uppercase',background:!filter?'var(--acc-d)':'var(--surf2)',
            border:`1px solid ${!filter?'var(--acc)':'var(--b2)'}`,
            color:!filter?'var(--acc)':'var(--td)'}}>
          ALL
        </button>
        {cats.map(c=>(
          <button key={c} onClick={()=>setFilter(filter===c?'':c)}
            style={{padding:'4px 10px',borderRadius:'4px',fontSize:'11px',
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'.04em',
              textTransform:'uppercase',
              background:filter===c?`${catColor(c)}22`:'var(--surf2)',
              border:`1px solid ${filter===c?catColor(c)+'55':'var(--b2)'}`,
              color:filter===c?catColor(c):'var(--td)'}}>
            {c}
          </button>
        ))}
      </div>

      {/* Results */}
      <div style={{fontSize:'11px',color:'var(--td)',marginBottom:'10px'}}>
        {filtered.length} exercise{filtered.length!==1?'s':''}
      </div>
      {filtered.map(([id,ex])=>{
        const cc=catColor(ex.cat);
        return (
          <button key={id}
            onClick={()=>dispatch({t:'EX_DETAIL',id})}
            style={{...S.card,width:'100%',marginBottom:'6px',padding:'12px',textAlign:'left',
              display:'block',cursor:'pointer',borderLeft:`2px solid ${cc}55`,transition:'background .15s'}}>
            <div style={{...S.row,justifyContent:'space-between',marginBottom:'4px'}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'15px',fontWeight:700}}>
                {ex.name}
              </span>
              <Badge text={ex.cat} color={cc} small/>
            </div>
            <div style={{fontSize:'11px',color:'var(--td)'}}>
              {ex.muscles.join(' · ')}
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ─── EXERCISE DETAIL VIEW ─────────────────────────────────────────────────────
function ExDetailView({state,dispatch}){
  const ex=EX[state.exDetail];
  if(!ex) return null;
  const cc=catColor(ex.cat);
  // find where this ex appears
  const appearances=[];
  Object.values(PROGRAMS).forEach(p=>{
    p.days.forEach(day=>{
      day.blocks.forEach(bl=>{
        bl.ex.forEach(e=>{
          if(e.id===state.exDetail){
            appearances.push({prog:p.short,day:day.name,sets:e.sets,reps:e.reps});
          }
        });
      });
    });
  });

  return (
    <div className="fi" style={{padding:'20px 16px',paddingBottom:'80px',maxWidth:'480px',margin:'0 auto'}}>
      <button onClick={()=>dispatch({t:'NAV',v:'library'})}
        style={{...S.row,gap:'6px',color:'var(--td)',marginBottom:'20px',
          fontFamily:"'Barlow Condensed',sans-serif",fontSize:'13px',fontWeight:600,letterSpacing:'.04em'}}>
        <IconArrow dir="left"/> BACK TO LIBRARY
      </button>

      <div style={{marginBottom:'8px'}}>
        <Badge text={ex.cat} color={cc}/>
      </div>
      <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'28px',fontWeight:800,
        letterSpacing:'-.02em',marginBottom:'16px'}}>
        {ex.name}
      </h2>

      {/* Muscles */}
      <div style={{...S.card,padding:'14px',marginBottom:'12px'}}>
        <div style={{...S.label,marginBottom:'8px'}}>Muscles Targeted</div>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {ex.muscles.map(m=>(
            <span key={m} style={{padding:'3px 8px',borderRadius:'3px',
              background:'var(--surf3)',border:'1px solid var(--b2)',
              fontSize:'12px',color:'var(--td)'}}>
              {m}
            </span>
          ))}
        </div>
      </div>

      {/* Instructions */}
      <div style={{...S.card,padding:'14px',marginBottom:'12px',
        borderLeft:`3px solid ${cc}`}}>
        <div style={{...S.label,marginBottom:'8px'}}>Instructions</div>
        <p style={{fontSize:'13px',color:'var(--txt)',lineHeight:1.65}}>{ex.info}</p>
      </div>

      {/* Programming context */}
      {appearances.length>0&&(
        <div style={{...S.card,padding:'14px'}}>
          <div style={{...S.label,marginBottom:'10px'}}>Programming Context</div>
          {appearances.map((a,i)=>(
            <div key={i} style={{...S.row,gap:'10px',padding:'7px 0',
              borderTop:i>0?'1px solid var(--b1)':'none'}}>
              <Badge text={a.prog} color={cc} small/>
              <div style={{flex:1}}>
                <div style={{fontSize:'12px',fontWeight:500}}>{a.day}</div>
                {a.sets&&<div style={{fontSize:'11px',color:'var(--td)',fontFamily:"'JetBrains Mono',monospace"}}>
                  {a.sets}×{a.reps}
                </div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────
function ProgressView({state,dispatch}){
  const p=PROGRAMS[state.prog];
  const [tab,setTab]=useState('body');

  // Compute PR board
  const prs={};
  Object.entries(state.logs).forEach(([wk,wkLog])=>{
    Object.entries(wkLog).forEach(([dayId,dayLog])=>{
      Object.entries(dayLog).forEach(([key,exLog])=>{
        if(key.startsWith('__')||!exLog.sets)return;
        const [bi,ei]=key.split('-').map(Number);
        const day=p.days.find(d=>d.id===dayId);
        if(!day)return;
        const blk=day.blocks[bi];
        if(!blk)return;
        const exRef=blk.ex[ei];
        if(!exRef)return;
        const exId=exRef.id;
        exLog.sets.forEach(s=>{
          if(s.done&&s.weight&&!isNaN(parseFloat(s.weight))){
            const w=parseFloat(s.weight);
            if(!prs[exId]||w>prs[exId].w){
              prs[exId]={w,reps:s.reps,week:parseInt(wk.slice(1))};
            }
          }
        });
      });
    });
  });

  // Week-by-week completion
  const weekData=Array.from({length:Math.min(state.week,8)},(_,i)=>{
    const w=state.week-i;
    const{done,total}=getWeekProgress(state.logs,state.prog,w);
    return{week:w,done,total,pct:total?Math.round(done/total*100):0};
  }).reverse();

  return (
    <div className="fi" style={{padding:'20px 16px',paddingBottom:'80px',maxWidth:'480px',margin:'0 auto'}}>
      <div style={{...S.label,marginBottom:'16px'}}>Performance Dashboard</div>

      {/* Tabs */}
      <div style={{...S.row,gap:'6px',marginBottom:'20px'}}>
        {[{id:'body',label:'Bodyweight'},{id:'prs',label:'PRs'},{id:'history',label:'History'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'6px 12px',borderRadius:'6px',
              fontFamily:"'Barlow Condensed',sans-serif",fontSize:'13px',fontWeight:700,
              letterSpacing:'.04em',textTransform:'uppercase',
              background:tab===t.id?'var(--surf3)':'transparent',
              border:`1px solid ${tab===t.id?'var(--b2)':'transparent'}`,
              color:tab===t.id?'var(--txt)':'var(--td)'}}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==='body'&&(
        <div>
          {state.bwLog.length===0?(
            <div style={{...S.card,padding:'24px',textAlign:'center'}}>
              <div style={{color:'var(--td)',fontSize:'13px'}}>No bodyweight entries yet.</div>
              <div style={{color:'var(--tm)',fontSize:'11px',marginTop:'6px'}}>Log from the Dashboard.</div>
            </div>
          ):(
            <>
              {/* Mini chart */}
              <div style={{...S.card,padding:'16px',marginBottom:'12px'}}>
                <div style={{...S.label,marginBottom:'12px'}}>Bodyweight Log</div>
                <div style={{display:'flex',alignItems:'flex-end',gap:'6px',height:'80px',marginBottom:'8px'}}>
                  {state.bwLog.slice(-12).map((e,i,arr)=>{
                    const vals=arr.map(x=>x.w);
                    const mn=Math.min(...vals),mx=Math.max(...vals);
                    const range=mx-mn||1;
                    const pct=(e.w-mn)/range;
                    const h=Math.max(12,pct*64+12);
                    const isLast=i===arr.length-1;
                    return(
                      <div key={i} style={{flex:1,display:'flex',flexDirection:'column',
                        alignItems:'center',gap:'3px',justifyContent:'flex-end'}}>
                        <div style={{width:'100%',borderRadius:'3px 3px 0 0',
                          background:isLast?'var(--acc)':'var(--surf3)',
                          border:`1px solid ${isLast?'var(--acc)':'var(--b2)'}`,
                          height:`${h}px`,transition:'height .4s ease'}}/>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',
                          color:isLast?'var(--acc)':'var(--tm)',textAlign:'center'}}>
                          {e.w}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{...S.row,justifyContent:'space-between'}}>
                  <span style={{fontSize:'11px',color:'var(--td)'}}>
                    Latest: <strong style={{color:'var(--txt)',fontFamily:"'JetBrains Mono',monospace"}}>
                      {state.bwLog[state.bwLog.length-1]?.w} {state.units}
                    </strong>
                  </span>
                  <span style={{fontSize:'11px',color:'var(--td)'}}>
                    {state.bwLog.length} entries
                  </span>
                </div>
              </div>
              {/* Raw log */}
              <div style={{...S.card,padding:'14px'}}>
                {state.bwLog.slice().reverse().slice(0,10).map((e,i)=>(
                  <div key={i} style={{...S.row,justifyContent:'space-between',padding:'7px 0',
                    borderTop:i>0?'1px solid var(--b1)':'none'}}>
                    <span style={{fontSize:'12px',color:'var(--td)'}}>{e.date}</span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'13px',fontWeight:500}}>
                      {e.w} {state.units}
                    </span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      )}

      {tab==='prs'&&(
        <div>
          {Object.keys(prs).length===0?(
            <div style={{...S.card,padding:'24px',textAlign:'center'}}>
              <div style={{color:'var(--td)',fontSize:'13px'}}>No PRs logged yet.</div>
              <div style={{color:'var(--tm)',fontSize:'11px',marginTop:'6px'}}>Log sets with weight to track PRs.</div>
            </div>
          ):(
            <div style={{...S.card,padding:'14px'}}>
              <div style={{...S.label,marginBottom:'10px'}}>Personal Records</div>
              {Object.entries(prs).map(([id,pr],i)=>{
                const ex=EX[id];
                const cc=catColor(ex?.cat||'strength');
                return(
                  <div key={id} style={{...S.row,justifyContent:'space-between',padding:'9px 0',
                    borderTop:i>0?'1px solid var(--b1)':'none'}}>
                    <div>
                      <div style={{fontSize:'13px',fontWeight:500}}>{ex?.name||id}</div>
                      <div style={{fontSize:'11px',color:'var(--td)'}}>Week {pr.week}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'16px',
                        fontWeight:700,color:cc}}>
                        {pr.w} {state.units}
                      </div>
                      {pr.reps&&<div style={{fontSize:'11px',color:'var(--td)'}}>×{pr.reps}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {tab==='history'&&(
        <div>
          <div style={{...S.card,padding:'14px',marginBottom:'12px'}}>
            <div style={{...S.label,marginBottom:'10px'}}>Weekly Consistency</div>
            {weekData.map((w,i)=>(
              <div key={i} style={{marginBottom:'10px'}}>
                <div style={{...S.row,justifyContent:'space-between',marginBottom:'5px'}}>
                  <span style={{...S.label,fontSize:'10px'}}>Week {w.week}</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'11px',
                    color:w.pct===100?'var(--ok)':w.pct>50?'var(--acc)':'var(--td)'}}>
                    {w.done}/{w.total}
                  </span>
                </div>
                <ProgressBar pct={w.pct} color={w.pct===100?'var(--ok)':w.pct>50?'var(--acc)':'var(--b3)'}/>
              </div>
            ))}
          </div>

          {/* All logged workouts */}
          <div style={{...S.card,padding:'14px'}}>
            <div style={{...S.label,marginBottom:'10px'}}>Mission Log</div>
            {Object.entries(state.logs).length===0?(
              <div style={{color:'var(--tm)',fontSize:'12px',padding:'8px 0'}}>No sessions logged yet.</div>
            ):(
              Object.entries(state.logs).reverse().map(([wk,wkLog])=>{
                const completedDays=Object.keys(wkLog).filter(k=>!k.startsWith('__')&&wkLog[k]?.__done);
                return(
                  <div key={wk} style={{marginBottom:'12px'}}>
                    <div style={{...S.label,fontSize:'10px',color:'var(--acc)',marginBottom:'6px'}}>
                      {wk.toUpperCase()}
                    </div>
                    {completedDays.map(dayId=>{
                      const day=p.days.find(d=>d.id===dayId);
                      if(!day)return null;
                      const ch=CHAR[day.char];
                      return(
                        <div key={dayId} style={{...S.row,gap:'8px',padding:'6px 8px',
                          background:'var(--surf2)',borderRadius:'5px',marginBottom:'4px',
                          borderLeft:`2px solid ${ch.color}`}}>
                          <div style={{...S.label,fontSize:'9px',color:ch.color}}>✓</div>
                          <div style={{fontSize:'12px'}}>{day.name}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function loadState(){
  try{
    const saved=localStorage.getItem('batprotocol-state');
    if(saved) return {...init,...JSON.parse(saved),view:'dash',dayId:null,expandEx:{},showWarmup:false};
  }catch(e){}
  return init;
}

function App(){
  const [state,dispatch]=useReducer(reducer,undefined,loadState);

  useEffect(()=>{
    try{
      const toSave={
        prog:state.prog,
        week:state.week,
        logs:state.logs,
        bwLog:state.bwLog,
        units:state.units,
      };
      localStorage.setItem('batprotocol-state',JSON.stringify(toSave));
    }catch(e){}
  },[state.prog,state.week,state.logs,state.bwLog,state.units]);

  const renderView=()=>{
    switch(state.view){
      case'dash':return <DashView state={state} dispatch={dispatch}/>;
      case'workout':return state.dayId
        ?<WorkoutView state={state} dispatch={dispatch}/>
        :<WorkoutPicker state={state} dispatch={dispatch}/>;
      case'programs':return <ProgramsView state={state} dispatch={dispatch}/>;
      case'library':return <LibraryView state={state} dispatch={dispatch}/>;
      case'exdetail':return <ExDetailView state={state} dispatch={dispatch}/>;
      case'progress':return <ProgressView state={state} dispatch={dispatch}/>;
      default:return <DashView state={state} dispatch={dispatch}/>;
    }
  };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)',maxWidth:'540px',margin:'0 auto',
      position:'relative'}}>
      {/* Top bar */}
      <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(7,7,10,.92)',
        backdropFilter:'blur(12px)',borderBottom:'1px solid var(--b1)',
        padding:'12px 16px 10px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'18px',fontWeight:900,
              letterSpacing:'.02em',lineHeight:1,color:'var(--txt)'}}>
              BAT-FAMILY<span style={{color:'var(--acc)'}}>·</span>HYBRID
            </div>
            <div style={{...S.label,fontSize:'9px',color:'var(--tm)',marginTop:'1px'}}>
              Mission Log
            </div>
          </div>
          <div style={{...S.row,gap:'8px'}}>
            <button onClick={()=>dispatch({t:'WEEK',w:state.week-1})}
              style={{width:'26px',height:'26px',borderRadius:'5px',background:'var(--surf2)',
                border:'1px solid var(--b2)',display:'flex',alignItems:'center',justifyContent:'center',
                color:'var(--td)'}}>
              <IconArrow dir="left"/>
            </button>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'12px',
              color:'var(--acc)',minWidth:'30px',textAlign:'center'}}>
              W{state.week}
            </div>
            <button onClick={()=>dispatch({t:'WEEK',w:state.week+1})}
              style={{width:'26px',height:'26px',borderRadius:'5px',background:'var(--surf2)',
                border:'1px solid var(--b2)',display:'flex',alignItems:'center',justifyContent:'center',
                color:'var(--td)'}}>
              <IconArrow dir="right"/>
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <main>{renderView()}</main>

      {/* Nav */}
      <NavBar view={state.view} dispatch={dispatch}/>
    </div>
  );
}

function WorkoutPicker({state,dispatch}){
  const p=PROGRAMS[state.prog];
  return(
    <div className="fi" style={{padding:'20px 16px',paddingBottom:'80px',maxWidth:'480px',margin:'0 auto'}}>
      <div style={{...S.label,marginBottom:'16px'}}>Select Today's Mission</div>
      {p.days.map(day=>{
        const ch=CHAR[day.char];
        const done=isDayDone(state.logs,state.week,day.id);
        return(
          <button key={day.id} onClick={()=>dispatch({t:'DAY',id:day.id})}
            style={{...S.card,width:'100%',marginBottom:'8px',padding:'14px',textAlign:'left',
              borderLeft:`3px solid ${done?ch.color+'44':ch.color}`,opacity:done?.7:1,
              display:'block',cursor:'pointer'}}>
            <div style={{...S.row,justifyContent:'space-between',marginBottom:'6px'}}>
              <Badge text={ch.label} color={ch.color} small/>
              <div style={{...S.row,gap:'8px'}}>
                {done&&<span style={{fontSize:'11px',color:'var(--ok)'}}>✓</span>}
                <span style={{...S.label,fontSize:'9px'}}>{day.label}</span>
              </div>
            </div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:'17px',fontWeight:700}}>
              {day.name}
            </div>
            <div style={{fontSize:'11px',color:'var(--td)',marginTop:'3px'}}>
              {day.blocks.reduce((a,b)=>a+b.ex.length,0)} exercises
            </div>
          </button>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
